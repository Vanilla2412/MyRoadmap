name: Amplify Deploy

on:
  schedule:
    - cron: "0 14 * * 0" # Weekly on Sundays at 23:00 JST (14:00 UTC)
  workflow_dispatch:
    inputs:
      reason:
        description: "Deploy reason"
        required: false
        default: "Manual deploy"

jobs:
  deploy-scheduled:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Amplify build (Scheduled)
        run: |
          if [ -z "$AMPLIFY_APP_ID" ]; then
            echo "Error: AMPLIFY_APP_ID secret is missing or empty."
            exit 1
          fi
          aws amplify start-job \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name main \
            --job-type RELEASE
        env:
          AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

      - name: Generate Execution Report
        run: |
          echo "## 🚀 Amplify Deployment Report (Scheduled)" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: Scheduled (Sunday 23:00 JST)" >> $GITHUB_STEP_SUMMARY
          echo "- **App ID**: \`${AMPLIFY_APP_ID}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`main\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: Job started successfully" >> $GITHUB_STEP_SUMMARY
        env:
          AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}

      - name: Slack Notification
        if: always()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            {
              "text": "*Amplify Deploy (Scheduled)*: ${{ job.status }}\n*App ID*: ${{ secrets.AMPLIFY_APP_ID }}\n*Branch*: main\n*URL*: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

  deploy-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger Amplify build (Manual)
        run: |
          if [ -z "$AMPLIFY_APP_ID" ]; then
            echo "Error: AMPLIFY_APP_ID secret is missing or empty."
            exit 1
          fi
          aws amplify start-job \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name main \
            --job-type RELEASE
        env:
          AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

      - name: Generate Execution Report
        run: |
          echo "## 🚀 Amplify Deployment Report (Manual)" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Reason**: ${{ github.event.inputs.reason }}" >> $GITHUB_STEP_SUMMARY
          echo "- **App ID**: \`${AMPLIFY_APP_ID}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`main\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: Job started successfully (Approved by Admin)" >> $GITHUB_STEP_SUMMARY
        env:
          AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}

      - name: Slack Notification
        if: always()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            {
              "text": "*Amplify Deploy (Manual)*: ${{ job.status }}\n*Triggered by*: ${{ github.actor }}\n*Reason*: ${{ github.event.inputs.reason }}\n*URL*: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
