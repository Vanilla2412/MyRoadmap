name: Next.js CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm install

      - name: Install Linux native bindings
        run: npm install lightningcss-linux-x64-gnu --ignore-scripts=false

      - name: Run ESLint
        run: npm run lint

      - name: Build Next.js app
        run: npm run build
