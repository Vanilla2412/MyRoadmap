name: Next.js CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: web/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('web/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          rm -f package-lock.json
          npm install

      - name: Create dummy amplify_outputs.json
        run: echo "{}" > amplify_outputs.json

      - name: Run TypeCheck
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint

      - name: Build Next.js app
        run: npm run build

      - name: Slack Notification
        if: always()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            {
              "text": "*CI Result*: ${{ job.status }}\n*Workflow*: ${{ github.workflow }}\n*Commit*: ${{ github.sha }}\n*URL*: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
