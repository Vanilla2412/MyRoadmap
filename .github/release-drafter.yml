name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

exclude-labels:
  - 'skip-changelog'

autolabeler:
  - label: 'feat'
    title:
      - '/^feat:/i'
    branch:
      - '/^feat\//i'
  - label: 'fix'
    title:
      - '/^fix:/i'
    branch:
      - '/^fix\//i'
  - label: 'docs'
    title:
      - '/^docs:/i'
    branch:
      - '/^docs\//i'
  - label: 'chore'
    title:
      - '/^chore:/i'
    branch:
      - '/^chore\//i'
categories:
  - title: '🚀 Features'
    labels:
      - 'feat'
      - 'feature'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
      - 'bug'
  - title: '📖 Documentation'
    labels:
      - 'docs'
      - 'documentation'
  - title: '🏠 Internal'
    labels:
      - 'chore'
      - 'refactor'
      - 'style'
      - 'test'
change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
template: |
  ## Change Log
  $CHANGES
  ---
  *Generated by Release Drafter*

# Versioning strategy: auto-increment based on labels
version-resolver:
  major:
    labels:
      - 'major'
  minor:
    labels:
      - 'minor'
      - 'feat'
  patch:
    labels:
      - 'patch'
      - 'fix'
  default: patch
